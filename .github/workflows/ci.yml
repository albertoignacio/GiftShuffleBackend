name: CI

on:
  push:
    paths:
      - 'GiftShuffleBackend/**'
  pull_request:
    paths:
      - 'GiftShuffleBackend/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.slnx') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore GiftShuffle.slnx
        working-directory: GiftShuffleBackend

      - name: Build
        run: dotnet build GiftShuffle.slnx --no-restore
        working-directory: GiftShuffleBackend

      - name: Test
        run: dotnet test GiftShuffle.slnx --no-build --verbosity normal
        working-directory: GiftShuffleBackend
