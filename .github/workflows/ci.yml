name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore GiftShuffle.slnx
        working-directory: GiftShuffleBackend

      - name: Build
        run: dotnet build GiftShuffle.slnx --no-restore
        working-directory: GiftShuffleBackend

      - name: Test
        run: dotnet test GiftShuffle.slnx --no-build --verbosity normal
        working-directory: GiftShuffleBackend
